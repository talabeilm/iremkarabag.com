title: Ayse Irem Karabag
tagline: Dispatches on refugee worldmaking, literature, and resistance
email: airemka@yorku.ca
description: >-
  Ayse Irem Karabag is a doctoral student and teaching assistant in the
  Department of English at York University. Her research examines critical
  refugee studies, queer and gender studies, and world literature, with a focus
  on narratives of resistance and refugee worldmaking.
